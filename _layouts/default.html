---
layout: compress
---
{% include base_path %}
<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    <!-- Add responsive styles -->
    <style>
      .visitor-map-container {
        text-align: center;
        padding: 10px;
      }
      
      /* For desktop/web */
      @media screen and (min-width: 769px) {
        .visitor-map-container {
          position: fixed;
          bottom: 20px;
          right: 20px;
          width: 200px;
        }
      }
      
      /* For mobile phones */
      @media screen and (max-width: 768px) {
        .visitor-map-container {
          position: static;
          width: 100%;
          margin: 10px auto;
          display: flex;
          flex-direction: column;
          align-items: center;
        }
      }
    </style>
  </head>
  <body>
    {% include browser-upgrade.html %}
    {% include masthead.html %}
    {{ content }}
    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
        <!-- Moved inside footer for better mobile layout -->
        <div class="visitor-map-container">
          <script type="text/javascript" id="clstr_globe" src="//clustrmaps.com/globe.js?d=0E1rWoBux5wkwVlskevZAOiyz4cm3i9Z591OQ54mmE4"></script>
          <p style="font-size: 12px; color: #666; margin-top: 5px;">Visitors</p>
        </div>
      </footer>
    </div>
    {% include scripts.html %}
  </body>
</html>
